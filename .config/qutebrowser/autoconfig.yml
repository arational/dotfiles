# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  aliases:
    global:
      q: quit
      w: session-save
      wq: quit --save
  auto_save.session:
    global: true
  backend:
    global: webengine
  bindings.commands:
    global:
      insert:
        <Alt+Backspace>: fake-key <Ctrl+Backspace>
        <Alt+Shift+b>: fake-key <Ctrl+Shift+Left>
        <Alt+Shift+f>: fake-key <Ctrl+Shift+Right>
        <Alt+b>: fake-key <Ctrl+Left>
        <Alt+f>: fake-key <Ctrl+Right>
        <Alt+w>: fake-key <Ctrl+c>
        <Ctrl+a>: fake-key <Home>
        <Ctrl+b>: fake-key <Left>
        <Ctrl+e>: fake-key <End>
        <Ctrl+f>: fake-key <Right>
        <Ctrl+g>: leave-mode
        <Ctrl+h>: fake-key <Ctrl+a>
        <Ctrl+k>: fake-key <Shift-End> ;; fake-key <Delete>
        <Ctrl+n>: fake-key <Down>
        <Ctrl+p>: fake-key <Up>
        <Ctrl+w>: fake-key <Ctrl+x>
        <Ctrl+y>: fake-key <Ctrl+v>
      normal:
        <: tab-move -
        <Alt+v>: scroll-page 0 -1
        <Alt+w>: fake-key <Ctrl+c>
        <Ctrl+p>: enter-mode passthrough
        <Ctrl+v>: scroll-page 0 1
        '>': tab-move +
        O: set-cmd-text -s :open -t -r
        Pp: open -t -r -- {clipboard}
        q: set-cmd-text :spawn mpv {url}
        zl: spawn --userscript qute-pass
        zpl: spawn --userscript qute-pass --password-only
        zul: spawn --userscript qute-pass --username-only
      prompt: {}
  content.default_encoding:
    global: utf-8
  content.geolocation:
    global: true
  content.headers.accept_language:
    global: en-US,en,de
  content.notifications.enabled:
    global: true
  content.pdfjs:
    global: true
  content.webgl:
    global: false
  downloads.location.directory:
    global: ~/var/downloads
  editor.command:
    global:
    - emc
    - '{}'
  fonts.completion.category:
    global: bold 10pt default_family
  fonts.completion.entry:
    global: 10pt default_family
  fonts.debug_console:
    global: 10pt default_family
  fonts.default_family:
    global:
    - Terminus
  fonts.downloads:
    global: 10pt default_family
  fonts.hints:
    global: bold 10pt default_family
  fonts.keyhint:
    global: 10pt default_family
  fonts.messages.error:
    global: 10pt default_family
  fonts.messages.info:
    global: 10pt default_family
  fonts.messages.warning:
    global: 10pt default_family
  fonts.prompts:
    global: 10pt sans-serif
  fonts.statusbar:
    global: 10pt default_family
  fonts.tabs.selected:
    global: 10pt default_family
  fonts.tabs.unselected:
    global: 10pt default_family
  fonts.web.size.default:
    global: 16
  fonts.web.size.default_fixed:
    global: 14
  fonts.web.size.minimum:
    global: 14
  fonts.web.size.minimum_logical:
    global: 6
  qt.args:
    global:
    - autoplay-policy=user-gesture-required
  url.open_base_url:
    global: false
  url.searchengines:
    global:
      DEFAULT: https://duckduckgo.com/?q={}
      a: http://www.amazon.de/gp/search?ie=UTF8&keywords={}&index=blended&linkCode=ur2&camp=1638&creative=6742
      d: https://www.dict.cc/?s={}
      g: https://www.google.com/search?name=f&hl=en&q={}
      maps: https://maps.google.de/maps?q={}
      r: https://projects.bevuta.com/issues/{}
      wd: https://de.wikipedia.org/w/index.php?title=Spezial:Suche&search={}
      we: https://en.wikipedia.org/wiki/Special:Search?go=Go&search={}
      y: https://www.youtube.com/results?search_query={}&search=Search
